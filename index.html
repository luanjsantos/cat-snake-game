<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
    <title>Cat Snake 🐱</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Segoe UI', sans-serif;
        color: #fff;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        letter-spacing: 2px;
      }

      #scoreboard {
        display: flex;
        gap: 2rem;
        margin-bottom: 1rem;
        font-size: 1.1rem;
      }

      #scoreboard span {
        background: #16213e;
        padding: 0.3rem 1rem;
        border-radius: 20px;
        border: 1px solid #e94560;
      }

      #mode-badge {
        background: #16213e;
        padding: 0.3rem 1rem;
        border-radius: 20px;
        border: 1px solid #bf00ff;
        color: #bf00ff;
        font-weight: bold;
        letter-spacing: 1px;
      }

      canvas {
        border: 3px solid #e94560;
        border-radius: 8px;
        background: #0f3460;
        box-shadow: 0 0 30px rgba(233, 69, 96, 0.4);
      }

      #message {
        margin-top: 1rem;
        font-size: 1.4rem;
        color: #e94560;
        min-height: 1.5rem;
        letter-spacing: 2px;
        font-weight: bold;
      }

      #controls {
        margin-top: 0.8rem;
        font-size: 0.85rem;
        color: #888;
      }

      /* ── Menu Overlay ── */
      #menu-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 15, 30, 0.97);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        z-index: 100;
        transition: opacity 0.2s;
      }
      #menu-overlay.hidden {
        display: none;
      }

      #menu-title {
        font-size: 2.8rem;
        font-weight: 900;
        letter-spacing: 4px;
        color: #fff;
        text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
      }

      #menu-subtitle {
        font-size: 0.9rem;
        color: #888;
        letter-spacing: 2px;
        margin-top: -1.5rem;
      }

      #mode-cards {
        display: flex;
        gap: 1.5rem;
      }

      .mode-card {
        width: 180px;
        padding: 1.8rem 1.2rem;
        border-radius: 16px;
        border: 2px solid #333;
        background: #16213e;
        cursor: pointer;
        text-align: center;
        transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
      }

      .mode-card .card-emoji {
        font-size: 2.8rem;
        line-height: 1;
      }

      .mode-card .card-title {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 2px;
        color: #ccc;
      }

      .mode-card.selected {
        border-color: #e94560;
        box-shadow: 0 0 24px rgba(233, 69, 96, 0.5);
        transform: translateY(-4px);
      }
      .mode-card.selected .card-title {
        color: #e94560;
      }

      #mode-info {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        min-height: 80px;
      }

      #mode-emoji {
        font-size: 2.2rem;
        line-height: 1;
      }

      #mode-label {
        font-size: 1.1rem;
        font-weight: 700;
        color: #e94560;
        letter-spacing: 3px;
      }

      #mode-description {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.1rem;
      }
      #mode-description span {
        font-size: 0.82rem;
        color: #aaa;
      }

      #menu-play-btn {
        margin-top: 0.5rem;
        padding: 0.8rem 3rem;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 3px;
        background: #e94560;
        color: #fff;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        transition: transform 0.1s, box-shadow 0.1s;
      }
      #menu-play-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
      }

      #menu-hint {
        font-size: 0.8rem;
        color: #555;
        letter-spacing: 1px;
      }
      #menu-hint b {
        color: #888;
      }

      /* ── Pause Overlay ── */
      #pause-overlay {
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 25, 0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        z-index: 90;
        backdrop-filter: blur(3px);
      }
      #pause-overlay.hidden {
        display: none;
      }

      #pause-title {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: 4px;
        color: #e94560;
        text-shadow: 0 0 16px rgba(233, 69, 96, 0.6);
      }

      .pause-btn {
        width: 220px;
        padding: 0.7rem 0;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 2px;
        border: 2px solid #333;
        border-radius: 12px;
        background: #16213e;
        color: #ccc;
        cursor: pointer;
        transition: border-color 0.12s, color 0.12s, transform 0.1s, box-shadow 0.12s;
      }
      .pause-btn:hover, .pause-btn.focused {
        border-color: #e94560;
        color: #e94560;
        transform: translateY(-2px);
        box-shadow: 0 0 16px rgba(233, 69, 96, 0.4);
      }

      #pause-hint {
        font-size: 0.75rem;
        color: #555;
        letter-spacing: 1px;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>

    <!-- ── Menu Overlay ── -->
    <div id="menu-overlay">
      <div id="menu-title">🐱 CAT SNAKE</div>
      <div id="menu-subtitle">SELECT A MODE</div>

      <div id="mode-cards">
        <div class="mode-card" id="mode-card-endless">
          <span class="card-emoji">♾️</span>
          <span class="card-title">ENDLESS</span>
        </div>
        <div class="mode-card" id="mode-card-stage">
          <span class="card-emoji">🏆</span>
          <span class="card-title">STAGE MODE</span>
        </div>
      </div>

      <div id="mode-info">
        <div id="mode-emoji"></div>
        <div id="mode-label"></div>
        <div id="mode-description"></div>
      </div>

      <button id="menu-play-btn">▶ PLAY</button>

      <div id="menu-hint"><b>← →</b> to choose &nbsp;|&nbsp; <b>ENTER</b> or click to play</div>
    </div>

    <!-- ── Game UI ── -->

    <!-- Pause Overlay -->
    <div id="pause-overlay" class="hidden">
      <div id="pause-title">⏸ PAUSED</div>
      <button class="pause-btn" id="pause-resume">▶ RESUME</button>
      <button class="pause-btn" id="pause-restart">🔄 RESTART</button>
      <button class="pause-btn" id="pause-exit">🚪 EXIT TO MENU</button>
      <div id="pause-hint">ESC to resume</div>
    </div>

    <h1>🐱 Cat Snake</h1>
    <div id="scoreboard">
      <span id="mode-badge">♾️ ENDLESS</span>
      <span>Score: <b id="score">0</b></span>
      <span>Level: <b id="level">1</b></span>
      <span>Length: <b id="length">3</b></span>
      <span>Best: <b id="best">0</b></span>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="message"></div>
    <div id="controls">Arrow Keys or WASD to move &nbsp;|&nbsp; Hold to boost 🚀 &nbsp;|&nbsp; ESC pause</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
